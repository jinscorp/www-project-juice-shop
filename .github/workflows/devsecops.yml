name: "DevSecOps Pipeline (SAST & SCA)"

on:
  push:
    branches: [ "master", "main" ] # 메인 브랜치 푸시 시 작동
  pull_request:
    branches: [ "master", "main" ] # PR 생성 시 작동

jobs:
  Security-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 2. Semgrep 정적 분석 (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          # 인터뷰 핵심: 초기 도입 시에는 오탐으로 인한 빌드 실패를 막기 위해 에러 발생 시에도 계속 진행
          auditOn: "never" 

      - name: 3. Trivy 오픈소스 라이브러리 분석 (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' # 파일시스템 스캔 (소스코드 내 라이브러리 타겟)
          format: 'table'
          # CRITICAL, HIGH 등급만 필터링하여 출력
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # 0으로 설정 시 취약점이 나와도 빌드가 실패(차단)되지 않음 (모니터링 모드)
